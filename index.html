<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Overwatch Ranked Tracker</title>

<style>
:root{
  --line:rgba(255,255,255,.11);
  --line2:rgba(255,255,255,.2);
  --text:#f8fbff;
  --muted:#9db0cf;
  --orange:#ff9d1c;
  --blue:#62d8ff;
  --green:#91f2b4;
  --red:#ff9aaa;
  --shadow:0 30px 90px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% -10%,rgba(98,216,255,.16),transparent 30%),
    radial-gradient(circle at 90% 5%,rgba(255,157,28,.16),transparent 30%),
    linear-gradient(180deg,#0b1428,#050914 55%,#03060c);
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.024) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.024) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;
  mask-image:linear-gradient(#000,transparent 88%);
}

.app{
  position:relative;
  z-index:1;
  width:min(1440px,calc(100% - 28px));
  margin:18px auto 48px;
  display:grid;
  gap:18px;
}

.surface{
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.028));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  border-radius:28px;
  backdrop-filter:blur(18px);
}

.top{
  position:sticky;
  top:12px;
  z-index:5;
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
}

.nav{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.brand{
  font-weight:950;
  letter-spacing:-.05em;
}

.brand span{color:var(--orange)}

button,input,select,textarea{font:inherit}

button{
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:var(--text);
  padding:11px 15px;
  border-radius:15px;
  font-weight:850;
  cursor:pointer;
  transition:.16s ease;
}

button:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.1);
  border-color:var(--line2);
}

button.active{
  background:linear-gradient(135deg,rgba(255,157,28,.25),rgba(98,216,255,.18));
  border-color:rgba(255,255,255,.2);
}

button.primary{
  background:linear-gradient(135deg,#ff9d1c,#ffc36a);
  color:#121a29;
  border:0;
}

button.secondary{
  background:rgba(98,216,255,.13);
  border-color:rgba(98,216,255,.25);
}

button.danger{
  background:rgba(255,100,120,.14);
  color:#ffc8d0;
}

input,select,textarea{
  width:100%;
  background:#0a111f;
  border:1px solid var(--line);
  color:var(--text);
  padding:13px 14px;
  border-radius:15px;
  outline:none;
}

select option{
  background:#101827;
  color:#fff;
}

textarea{
  min-height:100px;
  resize:vertical;
}

.hero{
  padding:34px;
  overflow:hidden;
  position:relative;
}

.hero:after{
  content:"";
  position:absolute;
  right:-220px;
  top:-220px;
  width:540px;
  height:540px;
  background:radial-gradient(circle,rgba(255,157,28,.22),transparent 65%);
  pointer-events:none;
}

.hero-grid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1fr minmax(330px,.42fr);
  gap:24px;
}

.eyebrow{
  display:inline-flex;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(98,216,255,.24);
  background:rgba(98,216,255,.1);
  color:#dff8ff;
  text-transform:uppercase;
  font-size:.76rem;
  font-weight:950;
  letter-spacing:.07em;
  margin-bottom:16px;
}

h1,h2,h3,p{margin:0}

h1{
  font-size:clamp(2.6rem,5.5vw,5.2rem);
  line-height:.88;
  letter-spacing:-.075em;
  max-width:11ch;
}

h2{
  font-size:clamp(1.45rem,2vw,2rem);
  letter-spacing:-.04em;
}

h3{font-size:1.05rem}

.lead{
  margin-top:16px;
  color:var(--muted);
  line-height:1.75;
  font-size:1.03rem;
  max-width:75ch;
}

.login{
  padding:18px;
  border-radius:22px;
  border:1px solid var(--line);
  background:rgba(5,9,18,.5);
  display:grid;
  gap:12px;
  align-self:start;
  align-content:start;
}

.login > button,
.auth button{
  width:fit-content;
  min-width:110px;
  min-height:0;
  padding:11px 18px;
  justify-self:start;
}

.auth{
  display:grid;
  gap:10px;
  align-items:start;
}

.auth input{
  max-width:360px;
}

.notice{
  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(98,216,255,.24);
  background:rgba(98,216,255,.1);
  color:#dff8ff;
  min-height:0;
}

.warn{
  border-color:rgba(255,157,28,.28);
  background:rgba(255,157,28,.1);
  color:#ffe4bd;
}

.muted,.small,.sub,.meta{color:var(--muted)}
.small,.meta{font-size:.9rem}

.stats{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:13px;
  margin-top:24px;
}

.stat,.panel,.profile,.rank,.daily,.entry,.editor,.mini{
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));
  border:1px solid var(--line);
  border-radius:22px;
}

.stat{
  padding:18px;
  min-height:120px;
  animation:rise .45s ease both;
}

.stat:nth-child(2){animation-delay:.04s}
.stat:nth-child(3){animation-delay:.08s}
.stat:nth-child(4){animation-delay:.12s}
.stat:nth-child(5){animation-delay:.16s}
.stat:nth-child(6){animation-delay:.2s}

@keyframes rise{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}

.label{
  display:block;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--muted);
  font-size:.74rem;
  font-weight:850;
  margin-bottom:10px;
}

.value{
  font-size:clamp(1.75rem,3vw,2.65rem);
  font-weight:950;
  line-height:1;
  letter-spacing:-.06em;
}

.win{color:var(--green)}
.loss{color:var(--red)}
.rate{color:var(--blue)}

.home-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  margin-top:24px;
}

.profile{
  padding:22px;
  display:grid;
  gap:16px;
}

.profile-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
}

.avatar{
  width:64px;
  height:64px;
  border-radius:20px;
  display:grid;
  place-items:center;
  font-weight:950;
  font-size:1.6rem;
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(135deg,rgba(255,157,28,.28),rgba(98,216,255,.18));
}

.mini-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.mini{padding:13px}

.main{
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(360px,.85fr);
  gap:18px;
}

.section{
  padding:24px;
  display:grid;
  gap:20px;
}

.section-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  flex-wrap:wrap;
}

.rank-grid,.daily-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:14px;
}

.rank{
  padding:18px;
  min-height:132px;
  position:relative;
  overflow:hidden;
}

.rank:after{
  content:"";
  position:absolute;
  right:-35px;
  bottom:-65px;
  width:145px;
  height:145px;
  background:currentColor;
  opacity:.08;
  border-radius:50%;
}

.rank-line{
  display:flex;
  align-items:center;
  gap:14px;
}

.rank-icon{
  width:58px;
  height:58px;
  flex:0 0 58px;
  display:grid;
  place-items:center;
  position:relative;
}

.rank-icon img{
  width:58px;
  height:58px;
  object-fit:contain;
  filter:drop-shadow(0 10px 14px rgba(0,0,0,.42));
}

.rank-icon.fallback:before{
  content:"";
  position:absolute;
  inset:6px;
  background:currentColor;
  clip-path:polygon(50% 0,88% 24%,78% 80%,50% 100%,22% 80%,12% 24%);
}

.rank-icon.fallback:after{
  content:attr(data-rank);
  position:relative;
  color:#07101d;
  font-size:.82rem;
  font-weight:1000;
}

.rank-text{
  font-size:clamp(1.45rem,2vw,2.05rem);
  font-weight:950;
  line-height:1.02;
  letter-spacing:-.06em;
}

.rank-bronze{color:#d89455}
.rank-silver{color:#d9e0ea}
.rank-gold{color:#ffd264}
.rank-platinum{color:#7fe7ff}
.rank-diamond{color:#7facff}
.rank-master{color:#cf8dff}
.rank-grandmaster{color:#ff8cb4}
.rank-champion{color:#ffe58f}
.rank-unranked{color:#aab6ca}

.daily{padding:16px}
.daily strong{font-size:1.15rem}

.chart{
  height:170px;
  display:flex;
  align-items:end;
  gap:8px;
  padding-top:24px;
}

.bar{
  flex:1;
  min-width:18px;
  border-radius:12px 12px 4px 4px;
  background:linear-gradient(180deg,#62d8ff,#396dff);
  position:relative;
}

.bar span{
  position:absolute;
  bottom:calc(100% + 4px);
  left:50%;
  transform:translateX(-50%);
  font-size:.72rem;
  color:var(--muted);
}

.editor{padding:20px}

.form{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.heroes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  max-height:210px;
  overflow:auto;
}

.pill{
  position:relative;
  cursor:pointer;
}

.pill input{
  position:absolute;
  opacity:0;
}

.pill span{
  display:inline-flex;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
}

.pill input:checked+span{
  background:linear-gradient(135deg,rgba(255,157,28,.25),rgba(98,216,255,.18));
  border-color:rgba(255,255,255,.2);
}

.bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.list{
  display:grid;
  gap:10px;
  max-height:620px;
  overflow:auto;
}

.entry{
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}

.tag{
  display:inline-flex;
  padding:8px 10px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:900;
}

.tag.win{
  background:rgba(46,212,122,.15);
  color:#b7f8d0;
}

.tag.loss{
  background:rgba(255,100,120,.14);
  color:#ffc4cc;
}

.empty{
  padding:28px;
  border:1px dashed rgba(255,255,255,.18);
  border-radius:20px;
  text-align:center;
  color:var(--muted);
}

a{color:#caf0ff}




/* Date field: visible centered arrow, native calendar remains clickable */
.date-control{
  position:relative;
  width:100%;
}

.date-control input[type="date"]{
  padding-right:58px;
  color-scheme:dark;
  cursor:pointer;
}

.date-control input[type="date"]::-webkit-calendar-picker-indicator{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  width:22px;
  height:22px;
  cursor:pointer;
  opacity:1;
  filter:invert(1) brightness(1.35);
}

.date-control:after{
  content:"⌄";
  position:absolute;
  right:42px;
  top:50%;
  transform:translateY(-56%);
  color:#dff8ff;
  pointer-events:none;
  font-size:1.05rem;
  line-height:1;
  opacity:.92;
}

@media(max-width:1100px){
  .hero-grid,.main,.bottom{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .home-grid{grid-template-columns:1fr}
  .top{position:relative;top:0}
  .form{grid-template-columns:1fr}
}

@media(max-width:620px){
  .app{width:calc(100% - 18px);margin-top:10px}
  .hero,.section{padding:18px}
  .stats{grid-template-columns:1fr}
  .top{flex-direction:column;align-items:flex-start}
  .entry{align-items:flex-start;flex-direction:column}
  .login > button,
  .auth button{width:100%}
  .auth input{max-width:none}
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const SUPABASE_URL = 'https://pgutyryolqmdokcoopto.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LiBZuCHj__muZ1GYKsbRNg_gcWjX7oS';

const ROLE_LABELS = {
  tank:'Tank',
  damage:'Damage',
  support:'Support',
  open_queue:'Open Queue'
};

const HEROES_BY_ROLE = {
  tank:['D.Va','Domina','Doomfist','Hazard','Junker Queen','Mauga','Orisa','Ramattra','Reinhardt','Roadhog','Sigma','Winston','Wrecking Ball','Zarya'],
  damage:['Anran','Ashe','Bastion','Cassidy','Echo','Emre','Freja','Genji','Hanzo','Junkrat','Mei','Pharah','Reaper','Sierra','Sojourn','Soldier: 76','Sombra','Symmetra','Torbjörn','Tracer','Vendetta','Venture','Widowmaker'],
  support:['Ana','Baptiste','Brigitte','Illari','Jetpack Cat','Juno','Kiriko','Lifeweaver','Lúcio','Mercy','Mizuki','Moira','Wuyang','Zenyatta']
};

const ALL_HEROES = [
  ...HEROES_BY_ROLE.tank,
  ...HEROES_BY_ROLE.damage,
  ...HEROES_BY_ROLE.support
].sort();

let client = null;
let user = null;
let matches = [];
let ranks = [];
let selected = null;
let dbReady = false;
let notice = '';

let profiles = [
  {
    slug:'scalii',
    display_name:'Scalii',
    battletag:'Scalii#2905',
    battletag_slug:'Scalii-2905',
    blizzard_profile_url:'https://overwatch.blizzard.com/en-us/career/c15dad86ba78d6ffb0a022%7Cab18d17d2e26f8db1868b8f0c0a98492/'
  },
  {
    slug:'koi',
    display_name:'Koi',
    battletag:'Koi#21676',
    battletag_slug:'Koi-21676',
    blizzard_profile_url:'https://overwatch.blizzard.com/en-us/career/f951a5c7e120cdfabf%7C1a2d2e391438c6788d4210edd57843ad/'
  }
];

const root = document.getElementById('root');
const todayISO = () => new Date().toISOString().slice(0,10);
const pct = (w,t) => t ? Math.round(w/t*100)+'%' : '0%';
const qs = id => document.getElementById(id);

function esc(v){
  return String(v ?? '').replace(/[&<>'"]/g,c=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#39;',
    '"':'&quot;'
  }[c]));
}

function title(v){
  return String(v || '')
    .replace(/[_-]/g,' ')
    .replace(/\b\w/g,m=>m.toUpperCase());
}

function heroes(role){
  return role === 'open_queue' ? ALL_HEROES : (HEROES_BY_ROLE[role] || []);
}

function heroChecklist(role){
  return '<div class="heroes">' + heroes(role).map(h => `
    <label class="pill">
      <input type="checkbox" name="heroMulti" value="${esc(h)}">
      <span>${esc(h)}</span>
    </label>
  `).join('') + '</div>';
}

function summarize(list){
  const wins = list.filter(x=>x.result === 'win').length;
  const losses = list.filter(x=>x.result === 'loss').length;
  return {
    wins,
    losses,
    total:wins + losses,
    rate:pct(wins,wins + losses)
  };
}

function summarizeByRole(list){
  const out = {};
  Object.keys(ROLE_LABELS).forEach(r=>{
    out[r] = summarize(list.filter(x=>x.role === r));
  });
  return out;
}

function summarizeByHero(list){
  const map = new Map();

  list.forEach(m=>{
    String(m.hero || '')
      .split(',')
      .map(x=>x.trim())
      .filter(Boolean)
      .forEach(h=>{
        const key = m.role + '__' + h;
        if(!map.has(key)){
          map.set(key,{role:m.role,hero:h,wins:0,losses:0});
        }
        if(m.result === 'win') map.get(key).wins++;
        else map.get(key).losses++;
      });
  });

  return [...map.values()]
    .map(x=>({
      ...x,
      total:x.wins + x.losses,
      rate:pct(x.wins,x.wins + x.losses)
    }))
    .sort((a,b)=>b.total - a.total);
}

function byDay(list){
  const map = new Map();

  list.slice().reverse().forEach(m=>{
    const k = m.played_on || '';
    if(!map.has(k)) map.set(k,{d:k,w:0,l:0});
    if(m.result === 'win') map.get(k).w++;
    else map.get(k).l++;
  });

  return [...map.values()].slice(-10);
}

function urls(obj,depth=0,out=[]){
  if(!obj || depth > 6) return out;

  if(typeof obj === 'string' && /^https?:\/\/.+\.(png|webp|svg|jpg|jpeg)/i.test(obj)){
    out.push(obj);
  } else if(typeof obj === 'object'){
    Object.keys(obj).forEach(k=>urls(obj[k],depth+1,out));
  }

  return out;
}

function rankImg(raw,label){
  const all = urls(raw);

  const terms = [
    'bronze',
    'silver',
    'gold',
    'platinum',
    'diamond',
    'master',
    'grandmaster',
    'champion'
  ];

  const term = terms.find(t=>label.toLowerCase().includes(t));
  const bad = /(tank|damage|support|role|roles|career-role|competitive-role|icon-portrait|hero)/i;

  return (
    all.find(u=>!bad.test(u) && term && u.toLowerCase().includes(term)) ||
    all.find(u=>!bad.test(u) && /(rank|tier|division|competitive)/i.test(u)) ||
    ''
  );
}

function rankInfo(rec){
  if(!rec){
    return {label:'Unranked',icon:'?',cls:'rank-unranked',img:''};
  }

  const raw = rec.raw_data || {};

  const candidates = [
    rec.division,
    rec.rank_label,
    raw.division,
    raw.rank,
    raw.tier_name,
    raw.name,
    raw.rank_name
  ].filter(Boolean).map(String);

  const clean = candidates
    .map(x=>x.replace(/https?:\/\/\S+/g,'').trim())
    .filter(Boolean);

  const name =
    clean.find(x=>/(bronze|silver|gold|platinum|diamond|master|grandmaster|champion)/i.test(x)) ||
    clean[0] ||
    '';

  const div = [
    raw.division_tier,
    raw.tier_number,
    raw.division_number,
    raw.subdivision,
    raw.tier
  ].find(x=>/^\d+$/.test(String(x))) || '';

  const label = name ? title(name) + (div ? ' ' + div : '') : 'Unranked';
  const c = label.toLowerCase();

  let cls = 'rank-unranked';
  let icon = '?';

  if(c.includes('champion')){cls='rank-champion';icon='C'}
  else if(c.includes('grandmaster')){cls='rank-grandmaster';icon='GM'}
  else if(c.includes('master')){cls='rank-master';icon='M'}
  else if(c.includes('diamond')){cls='rank-diamond';icon='D'}
  else if(c.includes('platinum')){cls='rank-platinum';icon='P'}
  else if(c.includes('gold')){cls='rank-gold';icon='G'}
  else if(c.includes('silver')){cls='rank-silver';icon='S'}
  else if(c.includes('bronze')){cls='rank-bronze';icon='B'}

  return {
    label,
    icon,
    cls,
    img:rankImg(raw,label)
  };
}

function selectedProfile(){
  return profiles.find(p=>p.slug === selected) || null;
}

function canEdit(){
  const p = selectedProfile();
  const email = (user?.email || '').toLowerCase();

  return !!(
    dbReady &&
    user &&
    p &&
    (
      p.auth_user_id === user.id ||
      email.split('@')[0] === p.slug
    )
  );
}

function setRoute(slug){
  selected = slug || null;
  history.replaceState(null,'',slug ? '#' + slug : location.pathname);
  loadData();
}

function authBox(){
  return user
    ? `
      <div class="notice">Logged in as <b>${esc(user.email)}</b></div>
      <button id="logoutBtn">Logout</button>
    `
    : `
      <form id="loginForm" class="auth">
        <input id="loginUsername" placeholder="username">
        <input id="loginPassword" type="password" placeholder="password">
        <button class="primary">Login</button>
      </form>
    `;
}

function nav(){
  return `
    <nav class="top surface">
      <div class="nav">
        <div class="brand">OW <span>Ranked</span></div>
        <button data-home class="${!selected ? 'active' : ''}">Home</button>
        ${profiles.map(p=>`
          <button data-nav="${esc(p.slug)}" class="${p.slug === selected ? 'active' : ''}">
            ${esc(p.display_name)}
          </button>
        `).join('')}
      </div>
      <div class="small">${user ? 'Logged in: ' + esc(user.email) : 'Public showcase'}</div>
    </nav>
  `;
}

  root.innerHTML = `<div class="app">${nav()}${html}</div>`;
  bind();
}

}

function render(){
  selected ? profilePage() : home();
}

function bind(){
  document.querySelectorAll('[data-home]').forEach(b=>{
    b.onclick = () => setRoute(null);
  });

  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.onclick = () => setRoute(b.dataset.nav);
  });

  qs('loginForm')?.addEventListener('submit',login);
  qs('logoutBtn')?.addEventListener('click',logout);
  qs('matchForm')?.addEventListener('submit',saveEntry);

  document.querySelectorAll('#syncRanksBtn').forEach(b=>{
    b.onclick = syncRanks;
  });

  qs('role')?.addEventListener('change',()=>{
    qs('heroWrap').innerHTML =
      '<div class="label">Heroes played this round</div>' +
      heroChecklist(qs('role').value);
  });


  const dateInput = qs('playedOn');
  const dateButton = qs('dateOpenBtn');
  const openDatePicker = () => {
    if(!dateInput) return;
    if(typeof dateInput.showPicker === 'function'){
      dateInput.showPicker();
    }else{
      dateInput.focus();
      dateInput.click();
    }
  };
  dateButton?.addEventListener('click', openDatePicker);
  dateInput?.addEventListener('click', () => {
    if(typeof dateInput.showPicker === 'function') dateInput.showPicker();
  });


  const dateWrap = document.querySelector('.date-control');
  const dateInput = qs('playedOn');
  const openDatePicker = () => {
    if(!dateInput) return;
    try{
      if(typeof dateInput.showPicker === 'function'){
        dateInput.showPicker();
      }else{
        dateInput.focus();
        dateInput.click();
      }
    }catch(e){
      dateInput.focus();
      dateInput.click();
    }
  };
  dateWrap?.addEventListener('click', openDatePicker);

  document.querySelectorAll('[data-delete]').forEach(b=>{
    b.onclick = () => removeEntry(b.dataset.delete);
  });
}

function loadScript(){
  return new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    let done = false;

    const timer = setTimeout(()=>{
      if(!done){
        done = true;
        reject(new Error('Supabase library timeout'));
      }
    },5000);

    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';

    s.onload = ()=>{
      if(done) return;
      done = true;
      clearTimeout(timer);
      resolve();
    };

    s.onerror = ()=>{
      if(done) return;
      done = true;
      clearTimeout(timer);
      reject(new Error('Supabase library failed to load'));
    };

    document.head.appendChild(s);
  });
}

function timeout(p,ms,label){
  return Promise.race([
    p,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error(label + ' timeout')),ms))
  ]);
}

async function loadData(){
  render();

  if(!client){
    notice = 'Connecting to database...';
    render();
    return;
  }

  try{
    notice = '';

    try{
      const a = await timeout(client.auth.getUser(),8000,'Auth');
      user = a.data.user || null;
    }catch(e){
      user = null;
    }

    const p = await timeout(
      client.from('profiles').select('*').order('display_name'),
      8000,
      'Profiles'
    );

    if(p.data?.length) profiles = p.data;

    const m = await timeout(
      client.from('matches').select('*').order('played_on',{ascending:false}).order('created_at',{ascending:false}),
      8000,
      'Matches'
    );

    matches = m.data || [];

    const r = await timeout(
      client.from('rank_snapshots').select('*'),
      8000,
      'Ranks'
    );

    ranks = r.data || [];

    dbReady = true;
    notice = '';
    render();

    if(selected) fetchLiveRanks(false);
  }catch(e){
    dbReady = false;
    notice = 'Database connection issue: ' + (e.message || e);
    render();
  }
}

function loginEmail(v){
  v = v.trim().toLowerCase();
  return v.includes('@') ? v : v + '@tracker.local';
}

async function login(e){
  e.preventDefault();

  if(!client){
    alert('Database is not connected yet.');
    return;
  }

  const {error} = await client.auth.signInWithPassword({
    email:loginEmail(qs('loginUsername').value),
    password:qs('loginPassword').value
  });

  if(error){
    alert(error.message);
    return;
  }

  await loadData();
}

async function logout(){
  if(client) await client.auth.signOut();
  await loadData();
}

async function saveEntry(e){
  e.preventDefault();

  if(!client){
    alert('Database is not connected.');
    return;
  }

  const selectedHeroes = [...document.querySelectorAll('input[name="heroMulti"]:checked')]
    .map(x=>x.value);

  if(!selectedHeroes.length){
    alert('Select at least one hero.');
    return;
  }

  const payload = {
    profile_slug:selected,
    played_on:qs('playedOn').value || todayISO(),
    role:qs('role').value,
    hero:selectedHeroes.join(', '),
    result:qs('result').value,
    note:qs('note').value.trim() || null
  };

  const {error} = await client.from('matches').insert(payload);

  if(error){
    alert(error.message);
    return;
  }

  await loadData();
}

async function removeEntry(id){
  if(!client || !confirm('Remove this entry?')) return;
  await client.from('matches').delete().eq('id',id);
  await loadData();
}

async function overfast(profile){
  const ids = [
    profile.battletag_slug,
    profile.battletag ? profile.battletag.replace('#','-') : null
  ].filter(Boolean);

  for(const id of [...new Set(ids)]){
    try{
      const res = await fetch(
        'https://overfast-api.tekrop.fr/players/' + encodeURIComponent(id) + '/summary'
      );

      if(res.ok){
        const j = await res.json();
        if(j?.competitive) return j;
      }
    }catch(e){}
  }

  return null;
}

async function fetchLiveRanks(save){
  const p = selectedProfile();
  if(!p) return;

  const j = await overfast(p);
  if(!j) return;

  const roleMap = {
    tank:j?.competitive?.pc?.tank,
    damage:j?.competitive?.pc?.damage,
    support:j?.competitive?.pc?.support,
    open_queue:j?.competitive?.pc?.open_queue
  };

  const live = [];

  for(const role of Object.keys(roleMap)){
    const value = roleMap[role];
    if(!value) continue;

    const row = {
      profile_slug:selected,
      role,
      rank_label:value.rank || value.division || null,
      division:value.division || null,
      raw_data:value,
      source:'overfast',
      synced_at:new Date().toISOString()
    };

    live.push(row);

    if(save && client){
      await client
        .from('rank_snapshots')
        .upsert(row,{onConflict:'profile_slug,role'});
    }
  }

  if(!save){
    ranks = [
      ...ranks.filter(r=>r.profile_slug !== selected || !live.some(x=>x.role === r.role)),
      ...live
    ];
    render();
  }
}

async function syncRanks(){
  try{
    await fetchLiveRanks(true);
    await loadData();
  }catch(e){
    alert('Rank sync failed.');
  }
}

const h = location.hash.replace('#','').trim().toLowerCase();
selected = ['scalii','koi'].includes(h) ? h : null;

render();

loadScript()
  .then(()=>{
    client = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    return loadData();
  })
  .catch(e=>{
    notice = 'Could not load database library. Public showcase still works.';
    render();
  });

setInterval(()=>{
  if(user && client && selected) syncRanks();
},600000);
