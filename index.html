<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overwatch Tracker</title>
  <style>
    :root {
      --bg: #060b14;
      --bg2: #0b1322;
      --panel: rgba(12, 18, 30, 0.72);
      --panel-strong: rgba(12, 18, 30, 0.9);
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.12);
      --text: #f7fbff;
      --muted: #93a6c7;
      --accent: #ff9d1c;
      --accent2: #4ecbff;
      --green: #2ed47a;
      --red: #ff6478;
      --gold: #ffd166;
      --shadow: 0 30px 80px rgba(0,0,0,0.45);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1420px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(78,203,255,0.14), transparent 25%),
        radial-gradient(circle at top right, rgba(255,157,28,0.13), transparent 30%),
        linear-gradient(180deg, #0a1323 0%, #060b14 45%, #04070d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.65), transparent 92%);
    }

    .app {
      width: min(var(--max), calc(100% - 28px));
      margin: 20px auto 42px;
      display: grid;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.022));
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 22px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      right: -120px;
      top: -120px;
      background: radial-gradient(circle, rgba(255,157,28,0.22), transparent 70%);
      pointer-events: none;
    }

    .hero-top,
    .section-head,
    .split {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(78,203,255,0.1);
      border: 1px solid rgba(78,203,255,0.18);
      color: #d9f7ff;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      letter-spacing: -0.06em;
      line-height: 0.92;
      max-width: 11ch;
    }

    h2 {
      font-size: clamp(1.3rem, 2vw, 1.9rem);
      letter-spacing: -0.03em;
    }

    h3 {
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .lead {
      max-width: 72ch;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 12px;
      font-size: 1rem;
    }

    .muted, .section-sub, .meta, .small {
      color: var(--muted);
    }

    .small { font-size: 0.9rem; }

    .auth-box,
    .stat-card,
    .rank-card,
    .daily-card,
    .hero-row,
    .match-row,
    .profile-chip,
    .private-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
    }

    .auth-box {
      min-width: min(100%, 390px);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .auth-row,
    .tabs,
    .toolbar,
    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 18px;
      min-height: 120px;
      display: grid;
      align-content: start;
    }

    .label {
      display: inline-block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .value {
      font-size: clamp(1.7rem, 3vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .value.win { color: #95f3ba; }
    .value.loss { color: #ffacb7; }
    .value.rate { color: #8be0ff; }

    .tabs button.active {
      background: linear-gradient(135deg, rgba(255,157,28,0.22), rgba(78,203,255,0.16));
      border-color: var(--line-strong);
    }

    .layout-main {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .layout-secondary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    @media (max-width: 1080px) {
      .layout-main,
      .layout-secondary {
        grid-template-columns: 1fr;
      }
    }

    .section-card {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .rank-grid,
    .daily-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 12px;
    }

    .rank-card,
    .daily-card {
      padding: 16px;
      min-height: 122px;
      display: grid;
      align-content: start;
    }

    .rank-meta {
      color: var(--gold);
      margin-top: 4px;
      font-size: 0.92rem;
    }

    .notice {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(78,203,255,0.18);
      background: rgba(78,203,255,0.1);
      color: #d9f7ff;
    }

    .private-panel {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    button, input, select, textarea {
      font: inherit;
      border-radius: 14px;
      border: 1px solid var(--line);
    }

    button {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease, opacity 0.14s ease;
    }

    button:hover { transform: translateY(-1px); }

    button.primary {
      background: linear-gradient(135deg, var(--accent), #ffb74d);
      color: #152032;
      border-color: transparent;
    }

    button.secondary {
      background: rgba(78,203,255,0.1);
      border-color: rgba(78,203,255,0.18);
    }

    button.danger {
      background: rgba(255,100,120,0.12);
      color: #ffc4cc;
    }

    button:disabled,
    input:disabled,
    select:disabled,
    textarea:disabled {
      opacity: 0.56;
      cursor: not-allowed;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px 14px;
      background: rgba(5, 10, 19, 0.44);
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .hero-list,
    .match-list {
      display: grid;
      gap: 10px;
      max-height: 620px;
      overflow: auto;
      padding-right: 2px;
    }

    .hero-row,
    .match-row {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .meta {
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .tag {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .tag.win {
      background: rgba(46,212,122,0.16);
      color: #b2f6ce;
    }

    .tag.loss {
      background: rgba(255,100,120,0.14);
      color: #ffc0c8;
    }

    .empty {
      padding: 24px;
      border-radius: var(--radius-lg);
      border: 1px dashed var(--line);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      text-align: center;
    }

    a { color: #bde9ff; }
  </style>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://pgutyryolqmdokcoopto.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_LiBZuCHj__muZ1GYKsbRNg_gcWjX7oS'
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    const ROLE_LABELS = {
      tank: 'Tank',
      damage: 'Damage',
      support: 'Support',
      open_queue: 'Open Queue'
    }

    const HEROES_BY_ROLE = {
      tank: ['D.Va','Doomfist','Hazard','Junker Queen','Mauga','Orisa','Ramattra','Reinhardt','Roadhog','Sigma','Winston','Wrecking Ball','Zarya'],
      damage: ['Ashe','Bastion','Cassidy','Echo','Freja','Genji','Hanzo','Junkrat','Mei','Pharah','Reaper','Sojourn','Soldier: 76','Sombra','Symmetra','Torbjörn','Tracer','Venture','Widowmaker'],
      support: ['Ana','Baptiste','Brigitte','Illari','Juno','Kiriko','Lifeweaver','Lúcio','Mercy','Moira','Zenyatta'],
      open_queue: ['Flexible']
    }

    let authUser = null
    let profiles = []
    let matches = []
    let ranks = []
    let selectedProfileSlug = 'scalii'

    const qs = (id) => document.getElementById(id)
    const todayISO = () => new Date().toISOString().slice(0, 10)
    const pct = (wins, total) => total ? `${Math.round((wins / total) * 100)}%` : '0%'

    async function loadAuth() {
      const { data } = await supabase.auth.getUser()
      authUser = data.user || null
    }

    async function loadProfiles() {
      const { data, error } = await supabase.from('profiles').select('*').order('display_name')
      if (error) throw error
      profiles = data || []
    }

    async function loadSelectedData() {
      const { data: m, error: matchError } = await supabase
        .from('matches')
        .select('*')
        .eq('profile_slug', selectedProfileSlug)
        .order('played_on', { ascending: false })
        .order('created_at', { ascending: false })
      if (matchError) throw matchError
      matches = m || []

      const { data: r, error: rankError } = await supabase
        .from('rank_snapshots')
        .select('*')
        .eq('profile_slug', selectedProfileSlug)
      if (rankError) throw rankError
      ranks = r || []
    }

    function selectedProfile() {
      return profiles.find((p) => p.slug === selectedProfileSlug) || null
    }

    function canEditSelected() {
      const profile = selectedProfile()
      return !!(authUser && profile && profile.auth_user_id === authUser.id)
    }

    function summarize(list) {
      const wins = list.filter((m) => m.result === 'win').length
      const losses = list.filter((m) => m.result === 'loss').length
      return { wins, losses, total: wins + losses, rate: pct(wins, wins + losses) }
    }

    function summarizeByRole(list) {
      const out = {}
      Object.keys(ROLE_LABELS).forEach((role) => {
        out[role] = summarize(list.filter((m) => m.role === role))
      })
      return out
    }

    function summarizeByHero(list) {
      const map = new Map()
      for (const match of list) {
        const key = `${match.role}__${match.hero}`
        if (!map.has(key)) map.set(key, { role: match.role, hero: match.hero, wins: 0, losses: 0 })
        const row = map.get(key)
        if (match.result === 'win') row.wins += 1
        else row.losses += 1
      }
      return [...map.values()]
        .map((item) => ({ ...item, total: item.wins + item.losses, rate: pct(item.wins, item.wins + item.losses) }))
        .sort((a, b) => b.total - a.total || a.hero.localeCompare(b.hero))
    }

    async function login(event) {
      event.preventDefault()
      const username = qs('loginUsername').value.trim().toLowerCase()
      const password = qs('loginPassword').value
      if (!username || !password) return alert('Enter username and password.')
      const email = `${username}@tracker.local`
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) return alert(error.message)
      await boot()
    }

    async function logout() {
      await supabase.auth.signOut()
      await boot()
    }

    async function addMatch(event) {
      event.preventDefault()
      if (!canEditSelected()) return alert('You can only edit your own profile.')
      const payload = {
        profile_slug: selectedProfileSlug,
        played_on: qs('playedOn').value || todayISO(),
        role: qs('role').value,
        hero: qs('hero').value.trim(),
        result: qs('result').value,
        note: qs('note').value.trim() || null
      }
      if (!payload.hero) return alert('Enter a hero.')
      const { error } = await supabase.from('matches').insert(payload)
      if (error) return alert(error.message)
      qs('note').value = ''
      await loadSelectedData()
      render()
    }

    async function deleteMatch(id) {
      if (!canEditSelected()) return
      if (!confirm('Delete this match?')) return
      const { error } = await supabase.from('matches').delete().eq('id', id)
      if (error) return alert(error.message)
      await loadSelectedData()
      render()
    }

    async function syncRanks() {
      if (!canEditSelected()) return alert('You can only sync your own profile.')
      const profile = selectedProfile()
      if (!profile?.battletag_slug) return alert('No BattleTag found for this profile.')
      try {
        const response = await fetch(`https://overfast-api.tekrop.fr/players/${encodeURIComponent(profile.battletag_slug)}/summary`)
        if (!response.ok) throw new Error('Sync source did not respond successfully.')
        const json = await response.json()
        const roleMap = {
          tank: json?.competitive?.pc?.tank || null,
          damage: json?.competitive?.pc?.damage || null,
          support: json?.competitive?.pc?.support || null,
          open_queue: json?.competitive?.pc?.open_queue || null
        }

        for (const role of Object.keys(roleMap)) {
          const value = roleMap[role]
          if (!value) continue
          const { error } = await supabase.from('rank_snapshots').upsert({
            profile_slug: selectedProfileSlug,
            role,
            rank_label: value.rank || null,
            division: value.division || null,
            source: 'overfast',
            raw_data: value,
            synced_at: new Date().toISOString()
          }, { onConflict: 'profile_slug,role' })
          if (error) throw error
        }

        await loadSelectedData()
        render()
      } catch (error) {
        alert(`Rank sync failed: ${error.message}`)
      }
    }

    function onRoleChange() {
      const role = qs('role').value
      const heroes = HEROES_BY_ROLE[role] || []
      qs('hero').setAttribute('list', `heroes-${role}`)
      if (!heroes.includes(qs('hero').value)) qs('hero').value = heroes[0] || ''
    }

    function render() {
      const profile = selectedProfile()
      const canEdit = canEditSelected()
      const totals = summarize(matches)
      const todayMatches = matches.filter((m) => m.played_on === todayISO())
      const today = summarize(todayMatches)
      const byRoleToday = summarizeByRole(todayMatches)
      const byHero = summarizeByHero(matches)
      const rankMap = Object.fromEntries(ranks.map((r) => [r.role, r]))
      const profileLink = profile?.blizzard_profile_url
        ? `<a href="${profile.blizzard_profile_url}" target="_blank" rel="noreferrer">Open official Blizzard profile</a>`
        : ''

      document.body.innerHTML = `
        <div class="app">
          <section class="hero glass">
            <div class="hero-top">
              <div>
                <div class="eyebrow">Premium tracker</div>
                <h1>Showcase the grind. Track the climb.</h1>
                <p class="lead">A premium Overwatch profile hub for Scalii and Koi with public stat showcases and private edit tools only when the correct player logs in.</p>
              </div>

              <div class="auth-box">
                ${
                  authUser
                    ? `
                      <div class="notice">Logged in as <strong>${authUser.email}</strong></div>
                      <div class="button-row">
                        <button id="logoutBtn">Logout</button>
                      </div>
                    `
                    : `
                      <form id="loginForm" class="auth-row">
                        <input id="loginUsername" aria-label="Username" />
                        <input id="loginPassword" type="password" aria-label="Password" />
                        <button class="primary" type="submit">Login</button>
                      </form>
                    `
                }
              </div>
            </div>

            <div class="tabs">
              ${profiles.map((p) => `<button data-profile="${p.slug}" class="${p.slug === selectedProfileSlug ? 'active' : ''}">${p.display_name}</button>`).join('')}
            </div>

            <div class="summary-grid">
              <div class="stat-card"><div class="label">Total Wins</div><div class="value win">${totals.wins}</div><div class="small">Tracked across all sessions</div></div>
              <div class="stat-card"><div class="label">Total Losses</div><div class="value loss">${totals.losses}</div><div class="small">Tracked across all sessions</div></div>
              <div class="stat-card"><div class="label">Games Played</div><div class="value">${totals.total}</div><div class="small">Lifetime tracked matches</div></div>
              <div class="stat-card"><div class="label">Win Rate</div><div class="value rate">${totals.rate}</div><div class="small">Overall profile performance</div></div>
              <div class="stat-card"><div class="label">Today's Games</div><div class="value">${today.total}</div><div class="small">Current daily session</div></div>
              <div class="stat-card"><div class="label">Today's Win Rate</div><div class="value rate">${today.rate}</div><div class="small">Live session snapshot</div></div>
            </div>
          </section>

          <section class="layout-main">
            <div class="glass section-card">
              <div class="section-head">
                <div>
                  <h2>${profile?.display_name || selectedProfileSlug}</h2>
                  <p class="section-sub">${profile?.battletag || ''}</p>
                  ${profileLink ? `<div style="margin-top:8px">${profileLink}</div>` : ''}
                </div>
                ${
                  canEdit
                    ? `<div class="notice">Private tools unlocked for this profile.</div>`
                    : `<div class="notice">Public showcase mode.</div>`
                }
              </div>

              <div class="split">
                <div>
                  <h3>Competitive ranks</h3>
                  <div class="section-sub">Live synced role ranks when available.</div>
                </div>
                ${canEdit ? `<button id="syncRanksBtn" class="secondary">Sync ranks</button>` : ``}
              </div>

              <div class="rank-grid">
                ${Object.keys(ROLE_LABELS).map((role) => `
                  <div class="rank-card">
                    <div class="label">${ROLE_LABELS[role]}</div>
                    <div class="value">${rankMap[role]?.rank_label || '-'}</div>
                    <div class="rank-meta">${rankMap[role]?.division || ''}</div>
                  </div>
                `).join('')}
              </div>

              <div class="split">
                <div>
                  <h3>Daily session breakdown</h3>
                  <div class="section-sub">Role-by-role results for today's games.</div>
                </div>
              </div>

              <div class="daily-grid">
                ${Object.keys(ROLE_LABELS).map((role) => `
                  <div class="daily-card">
                    <div class="label">${ROLE_LABELS[role]}</div>
                    <div><strong>${byRoleToday[role].wins}W / ${byRoleToday[role].losses}L</strong></div>
                    <div class="small">${byRoleToday[role].rate}</div>
                  </div>
                `).join('')}
              </div>
            </div>

            ${
              canEdit
                ? `
                  <div class="glass section-card">
                    <div class="private-panel">
                      <div>
                        <h2>Private match editor</h2>
                        <p class="section-sub">Only visible while logged in as this player.</p>
                      </div>

                      <form id="matchForm">
                        <div class="form-grid">
                          <div>
                            <div class="label">Date</div>
                            <input id="playedOn" type="date" value="${todayISO()}" />
                          </div>
                          <div>
                            <div class="label">Role</div>
                            <select id="role">
                              ${Object.entries(ROLE_LABELS).map(([key, label]) => `<option value="${key}">${label}</option>`).join('')}
                            </select>
                          </div>
                          <div>
                            <div class="label">Hero</div>
                            <input id="hero" list="heroes-damage" value="Genji" />
                          </div>
                          <div>
                            <div class="label">Result</div>
                            <select id="result">
                              <option value="win">Win</option>
                              <option value="loss">Loss</option>
                            </select>
                          </div>
                        </div>

                        ${Object.entries(HEROES_BY_ROLE).map(([role, heroes]) => `<datalist id="heroes-${role}">${heroes.map((hero) => `<option value="${hero}"></option>`).join('')}</datalist>`).join('')}

                        <div style="margin-top:12px;">
                          <div class="label">Session note</div>
                          <textarea id="note"></textarea>
                        </div>

                        <div class="toolbar" style="margin-top:14px;">
                          <button class="primary" type="submit">Save match</button>
                        </div>
                      </form>
                    </div>
                  </div>
                `
                : `
                  <div class="glass section-card">
                    <div>
                      <h2>Profile spotlight</h2>
                      <p class="section-sub">A public-facing view focused on performance and recent activity.</p>
                    </div>
                    <div class="empty">Login to unlock private edit tools for this profile.</div>
                  </div>
                `
            }
          </section>

          <section class="layout-secondary">
            <div class="glass section-card">
              <div class="split">
                <div>
                  <h2>Hero performance</h2>
                  <div class="section-sub">Which heroes are actually getting results.</div>
                </div>
              </div>
              <div class="hero-list">
                ${byHero.length ? byHero.map((item) => `
                  <div class="hero-row">
                    <div>
                      <strong>${item.hero}</strong>
                      <div class="meta">${ROLE_LABELS[item.role]} • ${item.total} games</div>
                    </div>
                    <div style="text-align:right;">
                      <strong>${item.wins}W / ${item.losses}L</strong>
                      <div class="meta">${item.rate}</div>
                    </div>
                  </div>
                `).join('') : '<div class="empty">No hero stats yet.</div>'}
              </div>
            </div>

            <div class="glass section-card">
              <div class="split">
                <div>
                  <h2>Recent match log</h2>
                  <div class="section-sub">Latest tracked games for this profile.</div>
                </div>
              </div>
              <div class="match-list">
                ${matches.length ? matches.map((match) => `
                  <div class="match-row">
                    <div>
                      <strong>${match.hero}</strong>
                      <div class="meta">${ROLE_LABELS[match.role] || match.role} • ${match.played_on}</div>
                      ${match.note ? `<div class="meta">${match.note}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
                      <span class="tag ${match.result}">${match.result.toUpperCase()}</span>
                      ${canEdit ? `<button class="danger" data-delete="${match.id}">Delete</button>` : ''}
                    </div>
                  </div>
                `).join('') : '<div class="empty">No matches logged yet.</div>'}
              </div>
            </div>
          </section>
        </div>
      `

      qs('loginForm')?.addEventListener('submit', login)
      qs('logoutBtn')?.addEventListener('click', logout)
      qs('matchForm')?.addEventListener('submit', addMatch)
      qs('role')?.addEventListener('change', onRoleChange)
      qs('syncRanksBtn')?.addEventListener('click', syncRanks)
      document.querySelectorAll('[data-profile]').forEach((button) => button.addEventListener('click', async () => {
        selectedProfileSlug = button.getAttribute('data-profile')
        await loadSelectedData()
        render()
      }))
      document.querySelectorAll('[data-delete]').forEach((button) => button.addEventListener('click', () => deleteMatch(button.getAttribute('data-delete'))))
    }

    async function boot() {
      try {
        await loadAuth()
        await loadProfiles()
        if (!profiles.find((p) => p.slug === selectedProfileSlug) && profiles[0]) selectedProfileSlug = profiles[0].slug
        await loadSelectedData()
        render()
      } catch (error) {
        document.body.innerHTML = `
          <div class="app">
            <div class="glass section-card">
              <h1>Setup still needed</h1>
              <p class="lead">${error.message}</p>
            </div>
          </div>
        `
      }
    }

    window.addEventListener('DOMContentLoaded', boot)
  </script>
</head>
<body></body>
</html>
