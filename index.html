<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Overwatch Ranked Tracker</title>
<style>
:root{--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.16);--text:#f7fbff;--muted:#9bb0d0;--accent:#ff9d1c;--green:#95f3ba;--red:#ffacb7;--blue:#8be0ff;--shadow:0 30px 80px rgba(0,0,0,.45);--radius:26px}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(78,203,255,.14),transparent 25%),radial-gradient(circle at top right,rgba(255,157,28,.13),transparent 30%),linear-gradient(180deg,#0a1323 0%,#060b14 55%,#04070d 100%)}.app{width:min(1420px,calc(100% - 28px));margin:20px auto 42px;display:grid;gap:18px}.glass{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.022));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(22px)}.hero{padding:28px;display:grid;gap:22px}.hero-top,.section-head,.split{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}.eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(78,203,255,.1);border:1px solid rgba(78,203,255,.18);color:#d9f7ff;font-size:.8rem;text-transform:uppercase;margin-bottom:14px}h1,h2,h3,p{margin:0}h1{font-size:clamp(2.3rem,5vw,4.4rem);line-height:.92;letter-spacing:-.06em;max-width:12ch}h2{font-size:clamp(1.35rem,2vw,1.9rem);letter-spacing:-.03em}h3{font-size:1.05rem}.lead{max-width:72ch;margin-top:12px;color:var(--muted);line-height:1.7}.auth-box,.stat-card,.rank-card,.daily-card,.hero-row,.match-row,.private-panel,.chart-card{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:22px}.auth-box{min-width:min(100%,390px);padding:16px;display:grid;gap:12px}.auth-row,.tabs,.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px}.rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:14px}.daily-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px}.stat-card,.rank-card,.daily-card{padding:18px;min-height:120px}.stat-card{animation:rise .45s ease both}.stat-card:nth-child(2){animation-delay:.04s}.stat-card:nth-child(3){animation-delay:.08s}.stat-card:nth-child(4){animation-delay:.12s}.stat-card:nth-child(5){animation-delay:.16s}.stat-card:nth-child(6){animation-delay:.2s}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}.label{display:block;font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}.value{font-size:clamp(1.7rem,3vw,2.6rem);font-weight:800;letter-spacing:-.05em;line-height:1}.win{color:var(--green)}.loss{color:var(--red)}.rate{color:var(--blue)}.layout-main{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr);gap:18px}.layout-secondary{display:grid;grid-template-columns:1fr 1fr;gap:18px}@media(max-width:1080px){.layout-main,.layout-secondary{grid-template-columns:1fr}.hero,.section-card{padding:18px}.auth-box{min-width:100%}.match-row,.hero-row{align-items:flex-start;flex-direction:column}.rank-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}}.section-card{padding:22px;display:grid;gap:18px}button,input,select,textarea{font:inherit;border-radius:14px;border:1px solid var(--line)}button{background:rgba(255,255,255,.06);color:var(--text);padding:12px 16px;font-weight:700;cursor:pointer}button.primary{background:linear-gradient(135deg,var(--accent),#ffb74d);color:#152032;border-color:transparent}button.secondary{background:rgba(78,203,255,.1);border-color:rgba(78,203,255,.18)}button.danger{background:rgba(255,100,120,.12);color:#ffc4cc}input,select,textarea{width:100%;padding:13px 14px;background:#101827;color:var(--text);outline:none}select option{background:#101827;color:#f7fbff}textarea{min-height:92px;resize:vertical}.tabs button.active{background:linear-gradient(135deg,rgba(255,157,28,.22),rgba(78,203,255,.16));border-color:var(--line2)}.notice{padding:12px 14px;border-radius:16px;border:1px solid rgba(78,203,255,.18);background:rgba(78,203,255,.1);color:#d9f7ff}.warning{border-color:rgba(255,157,28,.25);background:rgba(255,157,28,.08);color:#ffe0b3}.private-panel{padding:18px;display:grid;gap:16px}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.hero-checklist{display:flex;flex-wrap:wrap;gap:10px;max-height:180px;overflow:auto}.hero-pill{position:relative;cursor:pointer}.hero-pill input{position:absolute;opacity:0}.hero-pill span{display:inline-flex;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.hero-pill input:checked+span{background:linear-gradient(135deg,rgba(255,157,28,.24),rgba(78,203,255,.18));border-color:var(--line2)}.hero-list,.match-list{display:grid;gap:10px;max-height:620px;overflow:auto}.hero-row,.match-row{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}.meta,.small,.section-sub{color:var(--muted);font-size:.9rem}.tag{padding:8px 10px;border-radius:999px;font-size:.8rem;font-weight:800}.tag.win{background:rgba(46,212,122,.16);color:#b2f6ce}.tag.loss{background:rgba(255,100,120,.14);color:#ffc0c8}.empty{padding:24px;border-radius:22px;border:1px dashed var(--line);text-align:center;color:var(--muted)}.rank-main{display:flex;gap:12px;align-items:center;min-width:0}.rank-badge{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.06);font-weight:900;overflow:hidden;flex:0 0 42px}.rank-badge img{width:100%;height:100%;object-fit:contain}.rank-text{font-size:clamp(1.25rem,1.7vw,1.9rem);font-weight:800;line-height:1.05;letter-spacing:-.045em;overflow-wrap:anywhere}.rank-bronze{color:#d9a46d}.rank-silver{color:#d9dde5}.rank-gold{color:#ffd56a}.rank-platinum{color:#7fe7ff}.rank-diamond{color:#7faeff}.rank-master{color:#ce8cff}.rank-grandmaster{color:#ff8cb3}.rank-champion{color:#ffe08a}.daily-card strong{display:block;margin-top:4px;font-size:1.05rem}.chart-card{padding:18px}.chart{height:160px;display:flex;align-items:end;gap:8px}.bar{flex:1;min-width:18px;border-radius:10px 10px 3px 3px;background:linear-gradient(180deg,#4ecbff,#246bff);position:relative}.bar span{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--muted);white-space:nowrap}a{color:#bde9ff}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL='https://pgutyryolqmdokcoopto.supabase.co';
const SUPABASE_KEY='sb_publishable_LiBZuCHj__muZ1GYKsbRNg_gcWjX7oS';
const ROLE_LABELS={tank:'Tank',damage:'Damage',support:'Support',open_queue:'Open Queue'};
const HEROES_BY_ROLE={tank:['D.Va','Doomfist','Hazard','Junker Queen','Mauga','Orisa','Ramattra','Reinhardt','Roadhog','Sigma','Winston','Wrecking Ball','Zarya'],damage:['Ashe','Bastion','Cassidy','Echo','Freja','Genji','Hanzo','Junkrat','Mei','Pharah','Reaper','Sojourn','Soldier: 76','Sombra','Symmetra','Torbjörn','Tracer','Venture','Widowmaker'],support:['Ana','Baptiste','Brigitte','Illari','Juno','Kiriko','Lifeweaver','Lúcio','Mercy','Moira','Zenyatta']};
const ALL_HEROES=[...HEROES_BY_ROLE.tank,...HEROES_BY_ROLE.damage,...HEROES_BY_ROLE.support].sort();
let client=null,user=null,matches=[],ranks=[],selected='scalii',dbReady=false,notice='';
let profiles=[{slug:'scalii',display_name:'Scalii',battletag:'Scalii#2905',auth_user_id:null},{slug:'koi',display_name:'Koi',battletag:'Koi#21676',auth_user_id:null}];
const root=document.getElementById('root');
const todayISO=()=>new Date().toISOString().slice(0,10);
const pct=(w,t)=>t?Math.round(w/t*100)+'%':'0%';
const qs=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function titleCase(v){return String(v||'').replace(/[_-]/g,' ').replace(/\b\w/g,m=>m.toUpperCase())}
function heroesForRole(role){return role==='open_queue'?ALL_HEROES:(HEROES_BY_ROLE[role]||[])}
function heroChecklist(role){return '<div class="hero-checklist">'+heroesForRole(role).map(hero=>'<label class="hero-pill"><input type="checkbox" name="heroMulti" value="'+esc(hero)+'"><span>'+esc(hero)+'</span></label>').join('')+'</div>'}
function summarize(list){const wins=list.filter(x=>x.result==='win').length,losses=list.filter(x=>x.result==='loss').length;return{wins,losses,total:wins+losses,rate:pct(wins,wins+losses)}}
function summarizeByRole(list){const out={};Object.keys(ROLE_LABELS).forEach(role=>out[role]=summarize(list.filter(x=>x.role===role)));return out}
function summarizeByHero(list){const map=new Map();list.forEach(match=>{String(match.hero||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(hero=>{const key=match.role+'__'+hero;if(!map.has(key))map.set(key,{role:match.role,hero,wins:0,losses:0});const row=map.get(key);match.result==='win'?row.wins++:row.losses++})});return[...map.values()].map(x=>({...x,total:x.wins+x.losses,rate:pct(x.wins,x.wins+x.losses)})).sort((a,b)=>b.total-a.total)}
function byDay(list){const map=new Map();list.slice().reverse().forEach(m=>{const k=m.played_on||'';if(!map.has(k))map.set(k,{d:k,w:0,l:0});m.result==='win'?map.get(k).w++:map.get(k).l++});return[...map.values()].slice(-10)}
function findImg(obj,depth=0){if(!obj||depth>4)return'';if(typeof obj==='string'&&/^https?:\/\/.+\.(png|webp|svg|jpg|jpeg)/i.test(obj))return obj;if(typeof obj==='object'){for(const k of Object.keys(obj)){const r=findImg(obj[k],depth+1);if(r)return r}}return''}
function rankInfo(record){if(!record)return{label:'Unranked',icon:'?',cls:'rank-unranked',img:''};const raw=record.raw_data||{};const candidates=[record.division,record.rank_label,raw.division,raw.rank,raw.tier_name,raw.name,raw.rank_name].filter(Boolean).map(String);const clean=candidates.map(x=>x.replace(/https?:\/\/\S+/g,'').trim()).filter(Boolean);let name=clean.find(x=>/(bronze|silver|gold|platinum|diamond|master|grandmaster|champion)/i.test(x))||clean[0]||'';let div=[raw.division_tier,raw.tier_number,raw.division_number,raw.subdivision,raw.tier].find(x=>/^\d+$/.test(String(x)))||'';const label=name?titleCase(name)+(div?' '+div:''):'Unranked';const check=label.toLowerCase();let cls='rank-unranked',icon='?';if(check.includes('champion')){cls='rank-champion';icon='C'}else if(check.includes('grandmaster')){cls='rank-grandmaster';icon='GM'}else if(check.includes('master')){cls='rank-master';icon='M'}else if(check.includes('diamond')){cls='rank-diamond';icon='D'}else if(check.includes('platinum')){cls='rank-platinum';icon='P'}else if(check.includes('gold')){cls='rank-gold';icon='G'}else if(check.includes('silver')){cls='rank-silver';icon='S'}else if(check.includes('bronze')){cls='rank-bronze';icon='B'}return{label,icon,cls,img:findImg(raw)}}
function selectedProfile(){return profiles.find(p=>p.slug===selected)||profiles[0]}
function canEdit(){const p=selectedProfile();return!!(dbReady&&user&&p&&p.auth_user_id===user.id)}
function render(){const profile=selectedProfile(),editable=canEdit(),totals=summarize(matches),today=summarize(matches.filter(x=>x.played_on===todayISO())),todayRoles=summarizeByRole(matches.filter(x=>x.played_on===todayISO())),heroStats=summarizeByHero(matches),rankMap=Object.fromEntries(ranks.map(r=>[r.role,r])),days=byDay(matches);root.innerHTML='<div class="app"><section class="hero glass"><div class="hero-top"><div><div class="eyebrow">Premium tracker</div><h1>Showcase the grind. Track the climb.</h1><p class="lead">A personal tracker to see how Overwatch ranked is going, session by session.</p></div><div class="auth-box">'+(user?'<div class="notice">Logged in as <strong>'+esc(user.email)+'</strong></div><button id="logoutBtn">Logout</button>':'<form id="loginForm" class="auth-row"><input id="loginUsername" aria-label="Username"><input id="loginPassword" type="password" aria-label="Password"><button class="primary">Login</button></form>')+(notice?'<div class="notice warning">'+esc(notice)+'</div>':'')+'</div></div><div class="tabs">'+profiles.map(p=>'<button data-profile="'+esc(p.slug)+'" class="'+(p.slug===selected?'active':'')+'">'+esc(p.display_name)+'</button>').join('')+'</div><div class="summary-grid"><div class="stat-card"><div class="label">Total Wins</div><div class="value win">'+totals.wins+'</div><div class="small">Tracked across all sessions</div></div><div class="stat-card"><div class="label">Total Losses</div><div class="value loss">'+totals.losses+'</div><div class="small">Tracked across all sessions</div></div><div class="stat-card"><div class="label">Games Played</div><div class="value">'+totals.total+'</div><div class="small">Lifetime tracked matches</div></div><div class="stat-card"><div class="label">Win Rate</div><div class="value rate">'+totals.rate+'</div><div class="small">Overall profile performance</div></div><div class="stat-card"><div class="label">Today Games</div><div class="value">'+today.total+'</div><div class="small">Current daily session</div></div><div class="stat-card"><div class="label">Today Win Rate</div><div class="value rate">'+today.rate+'</div><div class="small">Live session snapshot</div></div></div></section><section class="layout-main"><div class="glass section-card"><div class="section-head"><div><h2>'+esc(profile?.display_name||selected)+'</h2><p class="section-sub">'+esc(profile?.battletag||'')+'</p>'+(profile?.blizzard_profile_url?'<a href="'+esc(profile.blizzard_profile_url)+'" target="_blank">Open official Blizzard profile</a>':'')+'</div><div class="notice">'+(editable?'Personal session tools unlocked.':'Profile showcase mode.')+'</div></div><div class="split"><div><h3>Competitive ranks</h3><div class="section-sub">Auto refreshes every 10 minutes when logged in.</div></div>'+(editable?'<button id="syncRanksBtn" class="secondary">Sync ranks</button>':'')+'</div><div class="rank-grid">'+Object.keys(ROLE_LABELS).map(role=>{const rank=rankInfo(rankMap[role]);return'<div class="rank-card '+rank.cls+'"><div class="label">'+ROLE_LABELS[role]+'</div><div class="rank-main"><span class="rank-badge">'+(rank.img?'<img src="'+esc(rank.img)+'" onerror="this.style.display=\'none\'">':rank.icon)+'</span><span class="rank-text">'+esc(rank.label)+'</span></div></div>'}).join('')+'</div><div><h3>Daily session breakdown</h3><div class="section-sub">Role-by-role results for today.</div></div><div class="daily-grid">'+Object.keys(ROLE_LABELS).map(role=>'<div class="daily-card"><div class="label">'+ROLE_LABELS[role]+'</div><strong>'+todayRoles[role].wins+'W / '+todayRoles[role].losses+'L</strong><div class="small">'+todayRoles[role].rate+'</div></div>').join('')+'</div><div class="chart-card"><h3>Winrate over time</h3><div class="chart">'+(days.length?days.map(d=>{const total=d.w+d.l,rate=total?Math.round(d.w/total*100):0;return'<div class="bar" style="height:'+Math.max(8,rate)+'%"><span>'+rate+'%</span></div>'}).join(''):'<div class="empty">No graph data yet.</div>')+'</div></div></div>'+(editable?'<div class="glass section-card"><div class="private-panel"><div><h2>Personal session tracker</h2><p class="section-sub">Use this to count wins and losses for your ranked grind.</p></div><form id="matchForm"><div class="form-grid"><div><div class="label">Date</div><input id="playedOn" type="date" value="'+todayISO()+'"></div><div><div class="label">Role</div><select id="role"><option value="damage" selected>Damage</option><option value="tank">Tank</option><option value="support">Support</option><option value="open_queue">Open Queue</option></select></div><div><div class="label">Result</div><select id="result"><option value="win">Win</option><option value="loss">Loss</option></select></div><div id="heroChecklistWrap" style="grid-column:1/-1"><div class="label">Heroes played this round</div>'+heroChecklist('damage')+'</div></div><div style="margin-top:12px"><div class="label">Session note</div><textarea id="note"></textarea></div><div class="toolbar" style="margin-top:14px"><button class="primary">Save entry</button></div></form></div></div>':'<div class="glass section-card"><h2>Session overview</h2><p class="section-sub">A public-facing view focused on rank progress and recent results.</p><div class="empty">Login to unlock the personal session tracker.</div></div>')+'</section><section class="layout-secondary"><div class="glass section-card"><h2>Hero performance</h2><div class="hero-list">'+(heroStats.length?heroStats.map(h=>'<div class="hero-row"><div><strong>'+esc(h.hero)+'</strong><div class="meta">'+(ROLE_LABELS[h.role]||h.role)+' • '+h.total+' games</div></div><div style="text-align:right"><strong>'+h.wins+'W / '+h.losses+'L</strong><div class="meta">'+h.rate+'</div></div></div>').join(''):'<div class="empty">No hero stats yet.</div>')+'</div></div><div class="glass section-card"><h2>Recent entries</h2><div class="match-list">'+(matches.length?matches.map(m=>'<div class="match-row"><div><strong>'+esc(m.hero)+'</strong><div class="meta">'+(ROLE_LABELS[m.role]||m.role)+' • '+esc(m.played_on)+'</div>'+(m.note?'<div class="meta">'+esc(m.note)+'</div>':'')+'</div><div><span class="tag '+esc(m.result)+'">'+String(m.result).toUpperCase()+'</span>'+(editable?'<button class="danger" data-delete="'+esc(m.id)+'">Remove</button>':'')+'</div></div>').join(''):'<div class="empty">No entries saved yet.</div>')+'</div></div></section></div>';bind()}
function bind(){document.querySelectorAll('[data-profile]').forEach(btn=>btn.addEventListener('click',async()=>{selected=btn.dataset.profile;await loadData()}));qs('loginForm')?.addEventListener('submit',login);qs('logoutBtn')?.addEventListener('click',logout);qs('matchForm')?.addEventListener('submit',saveEntry);qs('syncRanksBtn')?.addEventListener('click',syncRanks);qs('role')?.addEventListener('change',()=>{qs('heroChecklistWrap').innerHTML='<div class="label">Heroes played this round</div>'+heroChecklist(qs('role').value)});document.querySelectorAll('[data-delete]').forEach(btn=>btn.addEventListener('click',()=>removeEntry(btn.dataset.delete)))}
function loadScript(){return new Promise((resolve,reject)=>{const s=document.createElement('script');let done=false;const timer=setTimeout(()=>{if(!done){done=true;reject(new Error('Supabase library timeout'))}},5000);s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';s.onload=()=>{if(done)return;done=true;clearTimeout(timer);resolve()};s.onerror=()=>{if(done)return;done=true;clearTimeout(timer);reject(new Error('Supabase library failed to load'))};document.head.appendChild(s)})}
function withTimeout(p,ms,label){return Promise.race([p,new Promise((_,reject)=>setTimeout(()=>reject(new Error(label+' timeout')),ms))])}
async function loadData(){render();if(!client){notice='Connecting to database...';render();return}try{notice='';try{const auth=await withTimeout(client.auth.getUser(),8000,'Auth');user=auth.data.user||null}catch(e){user=null}const p=await withTimeout(client.from('profiles').select('*').order('display_name'),8000,'Profiles');if(p.data&&p.data.length)profiles=p.data;const m=await withTimeout(client.from('matches').select('*').eq('profile_slug',selected).order('played_on',{ascending:false}).order('created_at',{ascending:false}),8000,'Matches');matches=m.data||[];const r=await withTimeout(client.from('rank_snapshots').select('*').eq('profile_slug',selected),8000,'Ranks');ranks=r.data||[];dbReady=true;notice='';render()}catch(err){dbReady=false;notice='Database connection issue: '+(err.message||err);render()}}
async function login(e){e.preventDefault();if(!client)return alert('Database is not connected yet.');const username=qs('loginUsername').value.trim().toLowerCase();const password=qs('loginPassword').value;const{error}=await client.auth.signInWithPassword({email:username+'@tracker.local',password});if(error)return alert(error.message);await loadData()}
async function logout(){if(client)await client.auth.signOut();await loadData()}
async function saveEntry(e){e.preventDefault();if(!client)return alert('Database is not connected.');const selectedHeroes=[...document.querySelectorAll('input[name="heroMulti"]:checked')].map(x=>x.value);if(!selectedHeroes.length)return alert('Select at least one hero.');const payload={profile_slug:selected,played_on:qs('playedOn').value||todayISO(),role:qs('role').value,hero:selectedHeroes.join(', '),result:qs('result').value,note:qs('note').value.trim()||null};const{error}=await client.from('matches').insert(payload);if(error)return alert(error.message);await loadData()}
async function removeEntry(id){if(!client)return;if(!confirm('Remove this entry?'))return;await client.from('matches').delete().eq('id',id);await loadData()}
async function syncRanks(){if(!client)return;const p=selectedProfile();if(!p?.battletag_slug)return alert('No BattleTag found.');try{const res=await fetch('https://overfast-api.tekrop.fr/players/'+encodeURIComponent(p.battletag_slug)+'/summary');const json=await res.json();const roleMap={tank:json?.competitive?.pc?.tank,damage:json?.competitive?.pc?.damage,support:json?.competitive?.pc?.support,open_queue:json?.competitive?.pc?.open_queue};for(const role of Object.keys(roleMap)){const value=roleMap[role];if(!value)continue;await client.from('rank_snapshots').upsert({profile_slug:selected,role,rank_label:value.rank||null,division:value.division||null,raw_data:value,source:'overfast',synced_at:new Date().toISOString()},{onConflict:'profile_slug,role'})}await loadData()}catch(err){alert('Rank sync failed.')}}
render();loadScript().then(()=>{client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);return loadData()}).catch(err=>{notice='Could not load database library. The public showcase still works.';render()});setInterval(()=>{if(user&&client)syncRanks()},600000);
</script>
</body></html>
