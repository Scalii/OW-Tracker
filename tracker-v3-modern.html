<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overwatch Tracker</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0b1830;
      --panel: rgba(13, 23, 42, 0.78);
      --panel-strong: rgba(17, 25, 40, 0.92);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fbff;
      --muted: #9db1cf;
      --soft: #c9d6ea;
      --accent: #ff9f1a;
      --accent-2: #47c2ff;
      --green: #22c55e;
      --red: #ef4444;
      --gold: #ffd166;
      --shadow: 0 20px 45px rgba(0,0,0,0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --blur: blur(18px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(71,194,255,0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(255,159,26,0.16), transparent 30%),
        linear-gradient(180deg, #0b1730 0%, #08111e 45%, #060c16 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), transparent 90%);
    }

    .shell {
      width: min(1320px, calc(100% - 28px));
      margin: 18px auto 40px;
      display: grid;
      gap: 18px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      backdrop-filter: var(--blur);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px;
      display: grid;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -120px;
      top: -120px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(255,159,26,0.25), transparent 65%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(71,194,255,0.12);
      color: #d8f3ff;
      border: 1px solid rgba(71,194,255,0.2);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
      line-height: 0.95;
      max-width: 12ch;
    }

    .lead {
      margin-top: 12px;
      color: var(--muted);
      max-width: 68ch;
      line-height: 1.65;
      font-size: 1.02rem;
    }

    .auth-card {
      min-width: min(100%, 420px);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .auth-row, .toolbar, .player-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
    }

    .panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
    }

    .stat-card {
      padding: 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
    }

    .label {
      display: inline-block;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .value {
      font-weight: 800;
      font-size: clamp(1.55rem, 3vw, 2.4rem);
      letter-spacing: -0.03em;
    }

    .value.win { color: #82f1a6; }
    .value.loss { color: #ff9b9b; }
    .value.rate { color: #7ad5ff; }

    .main-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .secondary-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 18px;
    }

    @media (max-width: 1060px) {
      .main-grid, .secondary-grid { grid-template-columns: 1fr; }
    }

    .section-card {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .section-sub {
      color: var(--muted);
      font-size: 0.95rem;
    }

    button, input, select, textarea {
      font: inherit;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    button {
      cursor: pointer;
      padding: 12px 16px;
      font-weight: 700;
      color: var(--text);
      background: rgba(255,255,255,0.07);
      transition: transform .14s ease, background .14s ease, opacity .14s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.primary { background: linear-gradient(135deg, var(--accent), #ffb649); color: #152033; border-color: transparent; }
    button.secondary { background: rgba(71,194,255,0.1); border-color: rgba(71,194,255,0.18); }
    button.ghost { background: rgba(255,255,255,0.04); }
    button.delete { background: rgba(239,68,68,0.12); color: #ffc6c6; }
    button:disabled, input:disabled, select:disabled, textarea:disabled { opacity: .55; cursor: not-allowed; }

    input, select, textarea {
      width: 100%;
      padding: 13px 14px;
      background: rgba(5,10,18,0.45);
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--soft);
      font-size: 0.88rem;
    }

    .pill.active {
      background: linear-gradient(135deg, rgba(255,159,26,0.16), rgba(71,194,255,0.12));
      border-color: rgba(255,255,255,0.14);
    }

    .rank-grid, .daily-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .rank-card, .daily-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }

    .rank-meta { color: var(--gold); font-size: 0.92rem; margin-top: 6px; }

    .split-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hero-list, .history-list {
      display: grid;
      gap: 10px;
      max-height: 620px;
      overflow: auto;
      padding-right: 4px;
    }

    .hero-row, .match-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 5px;
    }

    .tag {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .tag.win { background: rgba(34,197,94,0.18); color: #9ef0b9; }
    .tag.loss { background: rgba(239,68,68,0.18); color: #ffb0b0; }

    .empty {
      padding: 26px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
    }

    .notice {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(71,194,255,0.18);
      background: rgba(71,194,255,0.1);
      color: #d7f3ff;
    }

    a { color: #bde9ff; }
    .small { font-size: 0.9rem; color: var(--muted); }
  </style>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://pgutyryolqmdokcoopto.supabase.co'
    const SUPABASE_KEY = 'REPLACE_WITH_YOUR_PUBLISHABLE_KEY'
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    const ROLE_LABELS = {
      tank: 'Tank',
      damage: 'Damage',
      support: 'Support',
      open_queue: 'Open Queue'
    }

    const HEROES_BY_ROLE = {
      tank: ['D.Va','Doomfist','Hazard','Junker Queen','Mauga','Orisa','Ramattra','Reinhardt','Roadhog','Sigma','Winston','Wrecking Ball','Zarya'],
      damage: ['Ashe','Bastion','Cassidy','Echo','Freja','Genji','Hanzo','Junkrat','Mei','Pharah','Reaper','Sojourn','Soldier: 76','Sombra','Symmetra','Torbjörn','Tracer','Venture','Widowmaker'],
      support: ['Ana','Baptiste','Brigitte','Illari','Juno','Kiriko','Lifeweaver','Lúcio','Mercy','Moira','Zenyatta'],
      open_queue: ['Flexible']
    }

    let authUser = null
    let profiles = []
    let matches = []
    let ranks = []
    let selectedProfileSlug = 'scalii'

    const qs = id => document.getElementById(id)
    const todayISO = () => new Date().toISOString().slice(0, 10)
    const pct = (wins, total) => total ? `${Math.round((wins / total) * 100)}%` : '0%'

    async function loadAuth() {
      const { data } = await supabase.auth.getUser()
      authUser = data.user || null
    }

    async function loadProfiles() {
      const { data, error } = await supabase.from('profiles').select('*').order('display_name')
      if (error) throw error
      profiles = data || []
    }

    async function loadSelectedData() {
      const { data: m, error: matchError } = await supabase
        .from('matches')
        .select('*')
        .eq('profile_slug', selectedProfileSlug)
        .order('played_on', { ascending: false })
        .order('created_at', { ascending: false })
      if (matchError) throw matchError
      matches = m || []

      const { data: r, error: rankError } = await supabase
        .from('rank_snapshots')
        .select('*')
        .eq('profile_slug', selectedProfileSlug)
      if (rankError) throw rankError
      ranks = r || []
    }

    function selectedProfile() {
      return profiles.find(p => p.slug === selectedProfileSlug) || null
    }

    function canEditSelected() {
      const profile = selectedProfile()
      return !!(authUser && profile && profile.auth_user_id === authUser.id)
    }

    function summarize(list) {
      const wins = list.filter(m => m.result === 'win').length
      const losses = list.filter(m => m.result === 'loss').length
      return { wins, losses, total: wins + losses, rate: pct(wins, wins + losses) }
    }

    function summarizeByRole(list) {
      const out = {}
      Object.keys(ROLE_LABELS).forEach(role => out[role] = summarize(list.filter(m => m.role === role)))
      return out
    }

    function summarizeByHero(list) {
      const map = new Map()
      for (const match of list) {
        const key = `${match.role}__${match.hero}`
        if (!map.has(key)) map.set(key, { role: match.role, hero: match.hero, wins: 0, losses: 0 })
        const row = map.get(key)
        if (match.result === 'win') row.wins += 1
        else row.losses += 1
      }
      return [...map.values()].map(item => ({
        ...item,
        total: item.wins + item.losses,
        rate: pct(item.wins, item.wins + item.losses)
      })).sort((a, b) => b.total - a.total || a.hero.localeCompare(b.hero))
    }

    async function login(event) {
      event.preventDefault()
      const username = qs('loginUsername').value.trim().toLowerCase()
      const password = qs('loginPassword').value
      if (!username || !password) return alert('Enter username and password.')
      const email = `${username}@tracker.local`
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) return alert(error.message)
      await boot()
    }

    async function logout() {
      await supabase.auth.signOut()
      await boot()
    }

    async function addMatch(event) {
      event.preventDefault()
      if (!canEditSelected()) return alert('You can only edit your own profile.')
      const payload = {
        profile_slug: selectedProfileSlug,
        played_on: qs('playedOn').value || todayISO(),
        role: qs('role').value,
        hero: qs('hero').value.trim(),
        result: qs('result').value,
        note: qs('note').value.trim() || null
      }
      if (!payload.hero) return alert('Enter a hero.')
      const { error } = await supabase.from('matches').insert(payload)
      if (error) return alert(error.message)
      qs('note').value = ''
      await loadSelectedData()
      render()
    }

    async function deleteMatch(id) {
      if (!canEditSelected()) return
      if (!confirm('Delete this match?')) return
      const { error } = await supabase.from('matches').delete().eq('id', id)
      if (error) return alert(error.message)
      await loadSelectedData()
      render()
    }

    async function syncRanks() {
      if (!canEditSelected()) return alert('You can only sync your own profile.')
      const profile = selectedProfile()
      if (!profile?.battletag_slug) return alert('No BattleTag found for this profile.')
      try {
        const response = await fetch(`https://overfast-api.tekrop.fr/players/${encodeURIComponent(profile.battletag_slug)}/summary`)
        if (!response.ok) throw new Error('Sync source did not respond successfully.')
        const json = await response.json()
        const roleMap = {
          tank: json?.competitive?.pc?.tank || null,
          damage: json?.competitive?.pc?.damage || null,
          support: json?.competitive?.pc?.support || null,
          open_queue: json?.competitive?.pc?.open_queue || null
        }

        for (const role of Object.keys(roleMap)) {
          const value = roleMap[role]
          if (!value) continue
          const { error } = await supabase.from('rank_snapshots').upsert({
            profile_slug: selectedProfileSlug,
            role,
            rank_label: value.rank || null,
            division: value.division || null,
            source: 'overfast',
            raw_data: value,
            synced_at: new Date().toISOString()
          }, { onConflict: 'profile_slug,role' })
          if (error) throw error
        }

        await loadSelectedData()
        render()
      } catch (error) {
        alert(`Rank sync failed: ${error.message}`)
      }
    }

    function onRoleChange() {
      const role = qs('role').value
      const heroes = HEROES_BY_ROLE[role] || []
      qs('hero').setAttribute('list', `heroes-${role}`)
      qs('hero').value = heroes[0] || ''
    }

    function render() {
      const profile = selectedProfile()
      const canEdit = canEditSelected()
      const totals = summarize(matches)
      const todayMatches = matches.filter(m => m.played_on === todayISO())
      const today = summarize(todayMatches)
      const byRoleToday = summarizeByRole(todayMatches)
      const byHero = summarizeByHero(matches)
      const rankMap = Object.fromEntries(ranks.map(r => [r.role, r]))
      const profileLink = profile?.blizzard_profile_url
        ? `<a href="${profile.blizzard_profile_url}" target="_blank" rel="noreferrer">Open official Blizzard profile</a>`
        : '<span class="small">Official Blizzard profile link will be added later.</span>'

      document.body.innerHTML = `
        <div class="shell">
          <section class="hero glass">
            <div class="hero-top">
              <div>
                <div class="eyebrow">Modern competitive dashboard</div>
                <h1>Track every session like a real ranked grind.</h1>
                <p class="lead">Clean profile switching, daily hero-by-role tracking, live cloud sync, read-only public viewing, and rank sync support for Scalii and Koi.</p>
              </div>
              <div class="auth-card">
                ${authUser ? `
                  <div class="notice">Logged in as <strong>${authUser.email}</strong></div>
                  <div class="auth-row">
                    <button id="logoutBtn" class="ghost">Logout</button>
                  </div>
                ` : `
                  <div>
                    <div class="label">Login</div>
                    <div class="small">Use username <strong>scalii</strong> or <strong>koi</strong>.</div>
                  </div>
                  <form id="loginForm" class="auth-row">
                    <input id="loginUsername" placeholder="Username" />
                    <input id="loginPassword" type="password" placeholder="Password" />
                    <button class="primary" type="submit">Enter dashboard</button>
                  </form>
                `}
              </div>
            </div>

            <div class="player-tabs">
              ${profiles.map(p => `<button class="pill ${p.slug === selectedProfileSlug ? 'active' : ''}" data-profile="${p.slug}">${p.display_name}</button>`).join('')}
            </div>

            <div class="stat-grid">
              <div class="stat-card"><div class="label">Total Wins</div><div class="value win">${totals.wins}</div></div>
              <div class="stat-card"><div class="label">Total Losses</div><div class="value loss">${totals.losses}</div></div>
              <div class="stat-card"><div class="label">Games Played</div><div class="value">${totals.total}</div></div>
              <div class="stat-card"><div class="label">Overall Win Rate</div><div class="value rate">${totals.rate}</div></div>
              <div class="stat-card"><div class="label">Today's Games</div><div class="value">${today.total}</div></div>
              <div class="stat-card"><div class="label">Today's Win Rate</div><div class="value rate">${today.rate}</div></div>
            </div>
          </section>

          <section class="main-grid">
            <div class="glass section-card">
              <div class="section-head">
                <div>
                  <h2>${profile?.display_name || selectedProfileSlug}</h2>
                  <p class="section-sub">${profile?.battletag || ''}</p>
                  <div style="margin-top:8px">${profileLink}</div>
                </div>
                <div class="notice">${canEdit ? 'Edit mode enabled for this profile.' : 'Public view mode. Login as this player to edit.'}</div>
              </div>

              <div class="split-title">
                <div>
                  <h3>Current competitive ranks</h3>
                  <div class="section-sub">Auto-sync uses the connected Overwatch source when available.</div>
                </div>
                <button id="syncRanksBtn" class="secondary" ${canEdit ? '' : 'disabled'}>Sync ranks</button>
              </div>

              <div class="rank-grid">
                ${Object.keys(ROLE_LABELS).map(role => `
                  <div class="rank-card">
                    <div class="label">${ROLE_LABELS[role]}</div>
                    <div class="value">${rankMap[role]?.rank_label || '-'}</div>
                    <div class="rank-meta">${rankMap[role]?.division || ''}</div>
                  </div>
                `).join('')}
              </div>

              <div class="split-title" style="margin-top:4px;">
                <div>
                  <h3>Daily session breakdown</h3>
                  <div class="section-sub">Quick read on how today is going by role.</div>
                </div>
              </div>

              <div class="daily-grid">
                ${Object.keys(ROLE_LABELS).map(role => `
                  <div class="daily-card">
                    <div class="label">${ROLE_LABELS[role]}</div>
                    <div><strong>${byRoleToday[role].wins}W / ${byRoleToday[role].losses}L</strong></div>
                    <div class="small">${byRoleToday[role].rate}</div>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="glass section-card">
              <div>
                <h2>Add match</h2>
                <p class="section-sub">Log role, hero, result, and optional notes for every session.</p>
              </div>

              <form id="matchForm">
                <div class="form-grid">
                  <div>
                    <div class="label">Date</div>
                    <input id="playedOn" type="date" value="${todayISO()}" ${canEdit ? '' : 'disabled'} />
                  </div>
                  <div>
                    <div class="label">Role</div>
                    <select id="role" ${canEdit ? '' : 'disabled'}>
                      ${Object.entries(ROLE_LABELS).map(([key, label]) => `<option value="${key}">${label}</option>`).join('')}
                    </select>
                  </div>
                  <div>
                    <div class="label">Hero</div>
                    <input id="hero" list="heroes-damage" value="Genji" placeholder="Hero" ${canEdit ? '' : 'disabled'} />
                  </div>
                  <div>
                    <div class="label">Result</div>
                    <select id="result" ${canEdit ? '' : 'disabled'}>
                      <option value="win">Win</option>
                      <option value="loss">Loss</option>
                    </select>
                  </div>
                </div>

                ${Object.entries(HEROES_BY_ROLE).map(([role, heroes]) => `<datalist id="heroes-${role}">${heroes.map(hero => `<option value="${hero}"></option>`).join('')}</datalist>`).join('')}

                <div style="margin-top:12px;">
                  <div class="label">Session note</div>
                  <textarea id="note" placeholder="Map pool, duo queue, tilt, aim feeling, comp synergy, etc." ${canEdit ? '' : 'disabled'}></textarea>
                </div>

                <div class="toolbar" style="margin-top:14px;">
                  <button class="primary" type="submit" ${canEdit ? '' : 'disabled'}>Save match</button>
                </div>
              </form>
            </div>
          </section>

          <section class="secondary-grid">
            <div class="glass section-card">
              <div class="split-title">
                <div>
                  <h2>Hero performance</h2>
                  <div class="section-sub">See who is actually carrying your sessions.</div>
                </div>
              </div>
              <div class="hero-list">
                ${byHero.length ? byHero.map(item => `
                  <div class="hero-row">
                    <div>
                      <strong>${item.hero}</strong>
                      <div class="meta">${ROLE_LABELS[item.role]} • ${item.total} games</div>
                    </div>
                    <div style="text-align:right;">
                      <strong>${item.wins}W / ${item.losses}L</strong>
                      <div class="meta">${item.rate}</div>
                    </div>
                  </div>
                `).join('') : '<div class="empty">No hero stats yet.</div>'}
              </div>
            </div>

            <div class="glass section-card">
              <div class="split-title">
                <div>
                  <h2>Recent match log</h2>
                  <div class="section-sub">Latest tracked games for this player.</div>
                </div>
              </div>
              <div class="history-list">
                ${matches.length ? matches.map(match => `
                  <div class="match-row">
                    <div>
                      <strong>${match.hero}</strong>
                      <div class="meta">${ROLE_LABELS[match.role] || match.role} • ${match.played_on}</div>
                      ${match.note ? `<div class="meta">${match.note}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
                      <span class="tag ${match.result}">${match.result.toUpperCase()}</span>
                      ${canEdit ? `<button class="delete" data-delete="${match.id}">Delete</button>` : ''}
                    </div>
                  </div>
                `).join('') : '<div class="empty">No matches logged yet.</div>'}
              </div>
            </div>
          </section>
        </div>
      `

      qs('loginForm')?.addEventListener('submit', login)
      qs('logoutBtn')?.addEventListener('click', logout)
      qs('matchForm')?.addEventListener('submit', addMatch)
      qs('role')?.addEventListener('change', onRoleChange)
      qs('syncRanksBtn')?.addEventListener('click', syncRanks)
      document.querySelectorAll('[data-profile]').forEach(button => button.addEventListener('click', async () => {
        selectedProfileSlug = button.getAttribute('data-profile')
        await loadSelectedData()
        render()
      }))
      document.querySelectorAll('[data-delete]').forEach(button => button.addEventListener('click', () => deleteMatch(button.getAttribute('data-delete'))))
    }

    async function boot() {
      try {
        await loadAuth()
        await loadProfiles()
        if (!profiles.find(p => p.slug === selectedProfileSlug) && profiles[0]) selectedProfileSlug = profiles[0].slug
        await loadSelectedData()
        render()
      } catch (error) {
        document.body.innerHTML = `
          <div class="shell">
            <div class="glass section-card">
              <h1>Setup still needed</h1>
              <p class="lead">${error.message}</p>
              <p class="small">Make sure the Supabase schema is already installed and this file has your publishable key pasted into the SUPABASE_KEY constant.</p>
            </div>
          </div>
        `
      }
    }

    window.addEventListener('DOMContentLoaded', boot)
  </script>
</head>
<body></body>
</html>
